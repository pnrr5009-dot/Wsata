<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة التحكم | Wsata Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { background: #020306; color: white; display: flex; height: 100vh; font-family: sans-serif; overflow: hidden; }
        .list-box { width: 350px; background: #080a12; border-left: 1px solid rgba(255,255,255,0.05); }
        .t-card { background: rgba(255,255,255,0.03); border: 1px solid transparent; padding: 20px; cursor: pointer; border-radius: 12px; margin: 10px; transition: 0.2s; position: relative; }
        .t-card:hover { background: rgba(251, 191, 36, 0.05); }
        .selected { border-color: #fbbf24; background: rgba(251, 191, 36, 0.08); }
        
        .toggle-wrapper { display: flex; align-items: center; gap: 5px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); border-radius: 10px; padding: 4px; }
        .toggle-wrapper label { font-size: 11px; cursor: pointer; padding: 6px 12px; border-radius: 8px; transition: 0.2s; user-select: none; }
        .toggle-wrapper label.active { background: #fbbf24; color: black; font-weight: bold; }
        .toggle-wrapper label.inactive { color: #555; }

        .sys-msg { background: rgba(251, 191, 36, 0.08); border: 1px solid rgba(251, 191, 36, 0.2); text-align: center; font-size: 13px; color: #fbbf24; padding: 10px; border-radius: 10px; margin: 10px 0; }
        
        #chat::-webkit-scrollbar { width: 5px; }
        #chat::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
    </style>
</head>
<body>
    <div class="list-box flex flex-col p-4">
        <h1 class="text-xl font-black text-yellow-500 mb-6 px-2">Wsata Admin</h1>
        <div id="tkList" class="flex-1 overflow-y-auto"></div>
    </div>

    <div class="flex-1 flex flex-col relative">
        <div id="main" class="hidden flex-1 flex flex-col">
            <!-- Header -->
            <div class="p-6 border-b border-white/5 flex flex-wrap items-center justify-between gap-4 bg-white/2">
                <div class="flex items-center gap-4">
                    <div id="uInfo" class="text-sm font-bold text-gray-300">--</div>
                    <div class="toggle-wrapper">
                        <label id="lblClient" class="active" onclick="setPayer('client')">العميل يدفع</label>
                        <label id="lblMediator" class="inactive" onclick="setPayer('mediator')">الوسيط يدفع</label>
                    </div>
                </div>
                
                <div class="flex gap-2">
                    <input type="number" id="a" placeholder="المبلغ" class="bg-black border border-white/10 p-2 w-20 rounded text-sm outline-none focus:border-yellow-500">
                    <input type="number" id="f" placeholder="العمولة" class="bg-black border border-white/10 p-2 w-20 rounded text-sm outline-none focus:border-yellow-500">
                    <button onclick="upd()" class="bg-green-600 px-3 py-2 rounded text-[10px] font-bold uppercase">تحديث</button>
                    <button onclick="askPay()" class="bg-yellow-500 text-black px-4 py-2 rounded text-[10px] font-black uppercase">طلب الدفع</button>
                    <button onclick="delTicket()" class="bg-red-600/20 text-red-500 border border-red-600/30 px-3 py-2 rounded text-[10px] font-bold hover:bg-red-600 hover:text-white transition">حذف التذكرة</button>
                </div>
            </div>

            <!-- Chat -->
            <div id="chat" class="flex-1 p-8 overflow-y-auto flex flex-col gap-3 bg-[#04050a]"></div>

            <!-- Input -->
            <div class="p-6 bg-black border-t border-white/5 flex gap-3">
                <input id="msg" type="text" class="flex-1 bg-white/5 p-4 rounded-xl outline-none focus:bg-white/10 transition" placeholder="اكتب ردك هنا...">
                <button onclick="send()" class="bg-yellow-500 text-black px-10 rounded-xl font-bold hover:scale-105 active:scale-95 transition">إرسال</button>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://wasata-af6ac-default-rtdb.europe-west1.firebasedatabase.app" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let sel = null;
        let payer = 'client';

        function setPayer(who) {
            payer = who;
            document.getElementById('lblClient').className = who === 'client' ? 'active' : 'inactive';
            document.getElementById('lblMediator').className = who === 'mediator' ? 'active' : 'inactive';
        }

        // جلب الرسائل والتذاكر
        db.ref('tickets').on('value', snap => {
            const list = document.getElementById('tkList');
            list.innerHTML = "";
            snap.forEach(t => {
                const d = t.val();
                const div = document.createElement('div');
                div.className = `t-card ${sel === t.key ? 'selected' : ''}`;
                div.innerHTML = `
                    <div class="font-bold text-sm text-gray-200">${d.userEmail || 'بدون إيميل'}</div>
                    <div class="text-[10px] text-gray-500 mt-1">${d.product || 'منتج غير محدد'}</div>
                `;
                div.onclick = () => { sel = t.key; load(t.key, d); };
                list.appendChild(div);
            });
        });

        function load(k, d) {
            document.getElementById('main').classList.remove('hidden');
            document.getElementById('uInfo').innerText = d.userEmail;
            
            const chatRef = db.ref('tickets/'+k+'/messages');
            chatRef.off(); // إزالة المستمعات القديمة
            chatRef.on('value', ms => {
                const cv = document.getElementById('chat'); cv.innerHTML = "";
                ms.forEach(m => {
                    const v = m.val();
                    const div = document.createElement('div');
                    if (v.system) {
                        div.className = 'sys-msg';
                        div.innerText = v.text;
                    } else {
                        div.className = `p-3 rounded-2xl max-w-[80%] text-sm ${v.sender === 'admin' ? 'bg-yellow-500 text-black self-start font-medium' : 'bg-white/5 text-white self-end border border-white/5'}`;
                        div.innerText = v.text;
                    }
                    cv.appendChild(div);
                });
                cv.scrollTop = cv.scrollHeight;
            });
        }

        function upd() {
            if(!sel) return;
            db.ref('tickets/'+sel).update({
                amount: document.getElementById('a').value,
                fee: document.getElementById('f').value,
                status: 'تم تحديد التكلفة'
            });
        }

        function askPay() {
            if(!sel) return;
            const tRef = db.ref('tickets/'+sel);
            const mRef = db.ref('tickets/'+sel+'/messages');

            if (payer === 'client') {
                // العميل يدفع: تظهر له خانة "ادفع الآن"
                tRef.update({ 
                    action: 'showPay', 
                    status: 'بانتظار التحويل المالي',
                    paidBy: 'client' 
                });
            } else {
                // الوسيط يدفع: تخفي خانة الدفع وتظهر رسالة "تم الدفع من الطرف الأخر"
                tRef.update({ 
                    action: 'hidePay', // كود العميل يجب أن يتعرف على هذا الأمر ليخفي الزر
                    status: 'تم الدفع من الطرف الأخر',
                    paidBy: 'mediator'
                });
                mRef.push({ text: 'تم الدفع من الطرف الأخر ✅', sender: 'admin', system: true });
            }
        }

        function delTicket() {
            if(!sel) return;
            if(confirm('هل أنت متأكد من حذف هذه التذكرة نهائياً؟')) {
                db.ref('tickets/'+sel).remove().then(() => {
                    document.getElementById('main').classList.add('hidden');
                    sel = null;
                });
            }
        }

        function send() {
            const v = document.getElementById('msg').value;
            if(v && sel) {
                db.ref('tickets/'+sel+'/messages').push({ text: v, sender: 'admin', time: Date.now() });
                document.getElementById('msg').value = "";
            }
        }
    </script>
</body>
</html>
